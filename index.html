<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-Time Pictography Board</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: #2b2b36;
            --text-color: #ffffff;
            --canvas-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #toolbar {
            background-color: var(--panel-bg);
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .tool-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 8px;
        }

        /* Highlight Admin Tools */
        #admin-tools {
            background: rgba(255, 77, 77, 0.2);
            display: none; /* Hidden by default */
        }

        .tool-label {
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            margin-right: 5px;
        }

        #main-heading {
            width: 100%; 
            text-align: center; 
            font-size: 18px; 
            margin-bottom: 5px;
            user-select: none; /* Prevent text highlighting during rapid taps */
            cursor: pointer;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn.active {
            border: 2px solid #fff;
            transform: scale(1.2);
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .stroke-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 2px solid transparent;
            background-color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .stroke-btn.active {
            border-color: #fff;
            background-color: #666;
        }

        .stroke-dot {
            background-color: #fff;
            border-radius: 50%;
        }

        /* Button Styles */
        button {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            color: white;
        }
        button:hover { opacity: 0.8; }
        
        #back-btn { background-color: #ff9500; }
        #clear-btn { background-color: #ff4d4d; }
        .admin-btn { background-color: #8E8E93; }

        #status {
            color: #ff4d4d;
            font-size: 12px;
            font-weight: bold;
            margin-left: auto;
            user-select: none;
            cursor: pointer;
        }
        #status.connected { color: #4CAF50; }

        #canvas-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }

        #board {
            background-color: var(--canvas-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1 / 1;
            touch-action: none;
            cursor: crosshair;
        }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            #toolbar { 
                flex-direction: column; 
                width: 280px; 
                justify-content: flex-start;
                overflow-y: auto;
            }
            .tool-group { flex-wrap: wrap; justify-content: center; }
            #status { margin-left: 0; margin-top: auto; }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div id="main-heading" class="tool-label">Pictography</div>
        
        <!-- Colors -->
        <div class="tool-group" id="color-picker">
            <span class="tool-label">Colors</span>
        </div>

        <!-- Thickness -->
        <div class="tool-group" id="stroke-picker">
            <span class="tool-label">Size</span>
        </div>

        <!-- Actions -->
        <div class="tool-group">
            <button id="back-btn">Back</button>
            <button id="clear-btn">Clear My Drawings</button>
        </div>

        <!-- Admin Tools (Hidden initially) -->
        <div class="tool-group" id="admin-tools">
            <span class="tool-label" style="width:100%;text-align:center;">Admin</span>
            <button id="clear-all-btn" class="admin-btn">Clear All</button>
            <button id="clear-except-me-btn" class="admin-btn">Clear All Except Me</button>
        </div>

        <!-- Connection Status -->
        <div id="status">Disconnected</div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="board" width="1000" height="1000"></canvas>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const colors =[
            '#000000', '#FFFFFF', '#FF3B30', '#34C759', 
            '#007AFF', '#FFCC00', '#FF9500', '#AF52DE', 
            '#FF2D55', '#A2845E', '#8E8E93', '#5AC8FA'
        ];
        const strokes =[1, 2, 4, 6, 8];

        let currentColor = colors[0];
        let currentStroke = strokes[2]; 
        
        let currentStrokeId = null; // Used for "Undo" functionality

        // --- 2. UI SETUP ---
        const colorPicker = document.getElementById('color-picker');
        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if(color === currentColor) btn.classList.add('active');
            
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = color;
            });
            colorPicker.appendChild(btn);
        });

        const strokePicker = document.getElementById('stroke-picker');
        strokes.forEach(width => {
            const btn = document.createElement('div');
            btn.className = 'stroke-btn';
            if(width === currentStroke) btn.classList.add('active');
            
            const dot = document.createElement('div');
            dot.className = 'stroke-dot';
            dot.style.width = (width * 2) + 'px';
            dot.style.height = (width * 2) + 'px';
            
            btn.appendChild(dot);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.stroke-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStroke = width;
            });
            strokePicker.appendChild(btn);
        });

        // Generate a random string for identifying specific drawing strokes
        function generateStrokeId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        // --- BUTTON ACTIONS ---
        document.getElementById('back-btn').addEventListener('click', () => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'undo' }));
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'clear' }));
            }
        });

        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'clear_all', password: 'area51' }));
            }
        });

        document.getElementById('clear-except-me-btn').addEventListener('click', () => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'clear_except_me', password: 'area51' }));
            }
        });

        // --- MULTI-TAP EASTER EGG LOGIC ---
        // Helper function to detect rapid consecutive taps
        function createMultiTapListener(triggerCount, timeWindow, callback) {
            let tapTimes =[];
            return function(e) {
                const now = Date.now();
                tapTimes.push(now);
                // Remove taps older than our time window
                tapTimes = tapTimes.filter(time => now - time < timeWindow);
                
                if (tapTimes.length >= triggerCount) {
                    tapTimes =[]; // Reset
                    callback();
                }
            }
        }

        // Easter Egg 1: Admin Mode (Status indicator)
        const statusTapHandler = createMultiTapListener(7, 2000, () => {
            const pwd = prompt("Enter Admin Password:");
            if (pwd === "area51") {
                document.getElementById('admin-tools').style.display = 'flex';
                alert("Admin Mode Unlocked.");
            }
        });
        document.getElementById('status').addEventListener('pointerdown', statusTapHandler);

        // Easter Egg 2: Secret Place (Heading)
        const headingElement = document.getElementById('main-heading');
        const headingTapHandler = createMultiTapListener(7, 2000, () => {
            const pwd = prompt("Enter Secret Place Password:");
            if (pwd === "paiza") {
                alert("Teleporting to Secret Place...");
                
                // 1. Update UI
                headingElement.textContent = "Secret Place";
                headingElement.style.color = "#FFD700"; // Give it a gold color
                
                // 2. Remove listener so it can't be triggered again
                headingElement.removeEventListener('pointerdown', headingTapHandler);
                
                // 3. Switch rooms
                currentRoom = 'secret';
                
                // Disconnect. The onclose handler will automatically reconnect us 
                // using the new currentRoom variable!
                if (socket) socket.close(); 
            }
        });
        headingElement.addEventListener('pointerdown', headingTapHandler);


        // --- 3. WEBSOCKET SETUP ---
        const BASE_WS_URL = 'wss://pictography-backend.storm-fyre.workers.dev'; 
        let currentRoom = 'global-room';
        let socket;
        let reconnectTimeout;
        const statusEl = document.getElementById('status');

        function connectWebSocket() {
            // Append the room name to the URL
            const url = `${BASE_WS_URL}?room=${currentRoom}`;
            socket = new WebSocket(url);

            socket.onopen = () => {
                statusEl.textContent = '● Connected';
                statusEl.classList.add('connected');
                clearTimeout(reconnectTimeout);
            };

            socket.onclose = () => {
                statusEl.textContent = '● Disconnected (Retrying...)';
                statusEl.classList.remove('connected');
                // Automatically attempt to reconnect after 3 seconds
                reconnectTimeout = setTimeout(connectWebSocket, 3000);
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'sync') {
                    // Wipe canvas clean
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Redraw entire history instantly
                    data.history.forEach(action => {
                        drawLine(action.x0, action.y0, action.x1, action.y1, action.color, action.width, null, false);
                    });
                } 
                else if (data.type === 'draw') {
                    drawLine(data.x0, data.y0, data.x1, data.y1, data.color, data.width, data.strokeId, false);
                }
            };
        }
        
        // Initial connection
        connectWebSocket();

        // --- 4. CANVAS DRAWING LOGIC ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Updated drawLine accepts strokeId so it can be sent to server
        function drawLine(x0, y0, x1, y1, color, width, strokeId, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
            ctx.closePath();

            if (!emit || !socket || socket.readyState !== WebSocket.OPEN) return;

            const drawData = {
                type: 'draw',
                x0: x0, y0: y0, x1: x1, y1: y1,
                color: color,
                width: width,
                strokeId: strokeId
            };
            socket.send(JSON.stringify(drawData));
        }

        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            
            // Start a new stroke, generate a new ID
            currentStrokeId = generateStrokeId();
            
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            
            drawLine(lastX, lastY, lastX, lastY, currentColor, currentStroke, currentStrokeId, true);
        }

        function continueDrawing(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getMousePos(e);
            
            drawLine(lastX, lastY, pos.x, pos.y, currentColor, currentStroke, currentStrokeId, true);
            
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing(e) {
            e.preventDefault();
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', continueDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', continueDrawing, { passive: false });
        canvas.addEventListener('touchend', stopDrawing, { passive: false });
        canvas.addEventListener('touchcancel', stopDrawing, { passive: false });

    </script>
</body>
</html>
